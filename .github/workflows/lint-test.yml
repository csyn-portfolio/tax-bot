name: lint-test
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - name: go vet (skipped when no .go files yet)
        run: |
          if find . -name '*.go' -not -path './vendor/*' | grep -q .; then
            go vet ./...
          else
            echo "No Go files yet — skipping vet"
          fi
      - name: go test (skipped when no .go files yet)
        run: |
          if find . -name '*.go' -not -path './vendor/*' | grep -q .; then
            go test ./... -race -count=1
          else
            echo "No Go files yet — skipping tests"
          fi
      - name: validate seed JSON against schema
        run: |
          go install github.com/santhosh-tekuri/jsonschema/cmd/jv@latest
          jv schema/tax-constants.schema.json data/tax-constants-2026.json
