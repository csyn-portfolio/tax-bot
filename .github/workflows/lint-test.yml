name: lint-test
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...
      - run: go test ./... -race -count=1
      - name: validate seed JSON against schema
        run: |
          go install github.com/santhosh-tekuri/jsonschema/cmd/jv@latest
          jv schema/tax-constants.schema.json data/tax-constants-2026.json
